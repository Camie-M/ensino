version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: challenge2-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tech123
      POSTGRES_DB: challenge2
    ports:
      - "5434:5432"
    networks:
      - challenge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    build: .
    container_name: challenge2-node
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=tech123
      - DB_NAME=challenge2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - challenge_network
    volumes:
      - .:/app
    command: >
      sh -c "npx prisma migrate deploy && npm run dev"

networks:
  challenge_network:
